<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .files-container {
            display: grid;
            gap: 15px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .file-item:hover {
            background-color: #f9f9f9;
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.1);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .file-icon {
            font-size: 24px;
            width: 30px;
            text-align: center;
        }

        .file-details {
            flex: 1;
        }

        .file-name {
            color: #333;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .file-size {
            color: #999;
            font-size: 12px;
        }

        .download-btn {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            white-space: nowrap;
        }

        .download-btn:hover {
            background-color: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state p {
            margin-bottom: 10px;
        }

        .folder-note {
            background-color: #f0f0f0;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #555;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .file-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .download-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📥 Download Platform</h1>
        <p class="subtitle">Last ned filer fra repoet</p>
        
        <div class="folder-note">
            💡 <strong>Tips:</strong> Legg filer i <code>downloads/</code> mappen for å gjøre dem tilgjengelige her.
        </div>

        <div id="filesContainer" class="files-container">
            <div class="empty-state">
                <p>Ingen filer funnet ennå</p>
                <p>Opprett en <code>downloads/</code> mappe og legg til filer for å se dem her</p>
            </div>
        </div>
    </div>

    <script>
        // Fetch files from downloads folder
        async function loadFiles() {
            try {
                const response = await fetch('https://api.github.com/repos/School-Byte-Two/Downloads/contents/downloads');
                
                if (response.status === 404) {
                    // Folder doesn't exist yet
                    console.log('Downloads folder not found');
                    return;
                }

                const files = await response.json();

                if (!Array.isArray(files) || files.length === 0) {
                    return;
                }

                const filesContainer = document.getElementById('filesContainer');
                filesContainer.innerHTML = '';

                files.forEach(file => {
                    if (file.type === 'file') {
                        const fileItem = createFileElement(file);
                        filesContainer.appendChild(fileItem);
                    }
                });

            } catch (error) {
                console.error('Error loading files:', error);
            }
        }

        function createFileElement(file) {
            const div = document.createElement('div');
            div.className = 'file-item';

            const fileIcon = getFileIcon(file.name);
            const fileSize = formatFileSize(file.size);
            const downloadUrl = file.download_url;

            div.innerHTML = `
                <div class="file-info">
                    <div class="file-icon">${fileIcon}</div>
                    <div class="file-details">
                        <div class="file-name">${file.name}</div>
                        <div class="file-size">${fileSize}</div>
                    </div>
                </div>
                <a href="${downloadUrl}" class="download-btn" download>Last ned</a>
            `;

            return div;
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'pdf': '📄',
                'doc': '📝',
                'docx': '📝',
                'txt': '📋',
                'zip': '📦',
                'rar': '📦',
                '7z': '📦',
                'jpg': '🖼️',
                'jpeg': '🖼️',
                'png': '🖼️',
                'gif': '🖼️',
                'mp4': '🎥',
                'mp3': '🎵',
                'exe': '⚙️',
                'apk': '📱',
                'xlsx': '📊',
                'csv': '📊',
            };
            return icons[ext] || '📁';
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }

        // Load files when page loads
        loadFiles();
        
        // Refresh files every 30 seconds
        setInterval(loadFiles, 30000);
    </script>
</body>
</html>
